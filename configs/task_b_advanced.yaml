method: sampling_residual_ensemble
seed: 42

train_data: data/data_ds15/train.pkl

speed_model:
  min_samples_per_bucket: 5

regression:
  model: hist_gradient_boosting   # ridge / random_forest / gradient_boosting / hist_gradient_boosting
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  random_state: 42

residual_learning:
  enabled: true

ensemble:
  w_time_bucket: 0.2
  w_regression: 0.8

sampling_residual_ensemble:
  weights:
    hgb_d8: 0.3
    xgb_a: 0.1
    xgb_b: 0.3
    lgbm_a: 0.3
  knn_residual_blend:
    enabled: true
    weight: 0.16
    neighbors: 233
    power: 2.0

constraints:
  min_travel_time: 30       # seconds
  max_speed_kmh: 120.0

evaluation:
  metrics: [mae, rmse, mape]
