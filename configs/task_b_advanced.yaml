method: ensemble_with_speed_constraints
seed: 42

train_data: data/student_release/data_ds15/train.pkl

speed_model:
  min_samples_per_bucket: 5

regression:
  model: gradient_boosting    # ridge / random_forest / gradient_boosting
  n_estimators: 200
  max_depth: 5
  learning_rate: 0.05
  random_state: 42

residual_learning:
  enabled: true

ensemble:
  w_time_bucket: 0.2
  w_regression: 0.8

constraints:
  min_travel_time: 30       # seconds
  max_speed_kmh: 120.0

evaluation:
  metrics: [mae, rmse, mape]
