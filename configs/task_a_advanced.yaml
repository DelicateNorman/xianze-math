method: local_segment_template_interpolation
seed: 42
train_data: data/data_ds15/train.pkl

interpolation:
  fill_boundary: nearest

speed_smoothing:
  max_speed_kmh: 120.0
  smoothing_window: 3
  iterations: 2

knn_template:
  enabled: true
  max_candidates: 200
  start_dist_thresh_km: 1.0
  end_dist_thresh_km: 1.0
  top_k: 5
  alpha_8: 0.3    # weight for template (1/8 keep rate)
  alpha_16: 0.2   # weight for template (1/16 keep rate)

local_segment_template:
  spans: [8, 16]
  max_segments_per_span: 500000
  samples_per_traj_span: 8
  min_displacement_m: 20.0
  top_k: 12
  max_feature_distance: 2.5
  alpha: 1.0

evaluation:
  only_missing: true
